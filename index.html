<!doctype html>
<html>
    <head>
        <link rel='stylesheet' href='index.css'>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Smythe&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    </head>
    <body class="ui-class">
        <header>
            <img class="header-img" src="images/header.png">
        </header>
        <main class="hero-section">
            <section class="items-section">
                <ul id="items-list">
                    <!-- render items -->
                </ul>
            </section>
            <section class="price-section" id="price-section">
                <p id="added-items-heading">Your order</p>
                <ul id="price-list">
                    <!-- render prices -->
                </ul>
                <p id="total-price">Total price</p>
                <button id="complete-order" type="submit">Complete order</button>
            </section>
            <div id="message-container">
                <p id="message"> 
                    <!-- render the message -->
                </p>
            </div>
            <section class="card-details-modal" id="card-details-modal">
                <form class="card-details-form">
                    <h1>Enter card details</h1>
                    <input 
                    class="form-input" 
                    id="input-name" 
                    type="text" 
                    placeholder='Enter your name'
                    required>
                    <input 
                    class="form-input" 
                    type ='text' 
                    placeholder="Enter card number"
                    required>
                    <input 
                    class="form-input" 
                    type="text" 
                    placeholder="Enter CVV"
                    required>
                    <button id="pay-btn">Pay</button>
                </form>
            </section>
        </main>
        <script type="module" src="index.js"></script>
    </body>
</html>
